name: On issue close → append CHANGELOG

on:
  issues:
    types: [closed]

# Explicit contents: write is required — the reusable workflow requests
# contents: write on its own job, but the caller's GITHUB_TOKEN permissions
# ceiling defaults to `read` at the repo level, and a callee cannot request
# permissions higher than what the caller grants. Without this block, the
# reusable workflow fails at startup ("This run likely failed because of a
# workflow file issue").
permissions:
  contents: write

jobs:
  call-append:
    # Reusable workflow lives in gitpush-mod/.github. It bootstraps CHANGELOG.md,
    # inserts a Keep-a-Changelog "Unreleased" entry, commits + pushes to main.
    # secrets: inherit → makes MOD_PROJECT_TOKEN (org secret) available to it.
    uses: gitpush-mod/.github/.github/workflows/append-changelog.yml@main
    secrets: inherit
    with:
      issue_number: ${{ github.event.issue.number }}
      issue_title: ${{ github.event.issue.title }}
      closed_by: ${{ github.event.sender.login }}
      state_reason: ${{ github.event.issue.state_reason }}
